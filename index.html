<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Controle de Presença</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
html, body { margin: 0; padding: 0; height: 100%; font-family: Arial; background: linear-gradient(135deg, #0f172a, #1e293b); color: white; }
#app { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
header { font-size: 42px; font-weight: bold; text-align: center; margin-bottom: 10px; }
#clock { font-size: 48px; margin: 20px; color: #38bdf8; }
#reader { width: 420px; max-width: 90%; min-height: 300px; border-radius: 12px; overflow: hidden; }
#nome { font-size: 36px; margin-top: 20px; text-align: center; font-weight: bold; }
#status { font-size: 28px; margin-top: 10px; padding: 15px 30px; border-radius: 10px; text-align: center; min-width: 300px; }
.sucesso { background: #16a34a; }
.saida { background: #2563eb; }
.licenca { background: #dc2626; }
.erro { background: #b91c1c; }
#info { position: fixed; bottom: 10px; left: 10px; font-size: 12px; color: rgba(255,255,255,0.3); }
</style>
</head>
<body>
<div id="app">
  <header>📍 Controle de Presença</header>
  <div id="clock">--:--:--</div>
  <div id="reader"></div>
  <div id="nome">Iniciando...</div>
  <div id="status"></div>
</div>
<div id="info">TIRA FALTAS v3.8</div>

<script>
// =====================================================
// CONFIGURAÇÃO - URL do Web App
// =====================================================
const API_URL = "https://script.google.com/macros/s/AKfycbyo47jByLARUsPpXcwaMQhVi_4b4IaGp7YQKFoJ1Zzd3Ksllx2wNh48gdsJ8UgUsSRp/exec";

// =====================================================
// SOM
// =====================================================
function bip() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const oscillator = ctx.createOscillator();
    const gainNode = ctx.createGain();
    oscillator.connect(gainNode);
    gainNode.connect(ctx.destination);
    oscillator.frequency.value = 1000;
    oscillator.type = "sine";
    oscillator.start();
    gainNode.gain.setValueAtTime(1, ctx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
    oscillator.stop(ctx.currentTime + 0.2);
  } catch(e) {}
}

function bipErro() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const oscillator = ctx.createOscillator();
    const gainNode = ctx.createGain();
    oscillator.connect(gainNode);
    gainNode.connect(ctx.destination);
    oscillator.frequency.value = 300;
    oscillator.type = "sine";
    oscillator.start();
    gainNode.gain.setValueAtTime(1, ctx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
    oscillator.stop(ctx.currentTime + 0.4);
  } catch(e) {}
}

// =====================================================
// VOZ
// =====================================================
function falar(texto) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(texto);
  utterance.lang = 'pt-BR';
  utterance.rate = 0.9;
  utterance.pitch = 0.95;
  window.speechSynthesis.speak(utterance);
}

// =====================================================
// SAUDAÇÃO - CORRIGIDA
// =====================================================
function getSaudacao() {
  const h = new Date().getHours();
  if (h >= 5 && h < 12) return 'Bom dia';
  if (h >= 12 && h < 18) return 'Boa tarde';
  return 'Boa noite';
}

// =====================================================
// RELÓGIO
// =====================================================
function atualizarRelogio() {
  const agora = new Date();
  document.getElementById("clock").innerText = 
    agora.toLocaleDateString('pt-BR') + " " + agora.toLocaleTimeString('pt-BR');
}
setInterval(atualizarRelogio, 1000);
atualizarRelogio();

// =====================================================
// LIMPAR TELA
// =====================================================
function limparTela() {
  document.getElementById("nome").innerText = "Aguardando leitura...";
  document.getElementById("status").innerText = "";
  document.getElementById("status").className = "";
}

// =====================================================
// LEITURA QR CODE
// =====================================================
let ultimoScan = "";

async function onScanSuccess(id) {
  // Evita leitura duplicada
  if (id === ultimoScan) return;
  ultimoScan = id;
  setTimeout(() => ultimoScan = "", 3000);

  bip();

  try {
    // Envia APENAS o ID para o backend decidir Entrada/Saída
    const response = await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({
        id: id
        // Não envia tipo nem status - o backend decide!
      })
    });

    const data = await response.json();
    const nome = data.nome || "Não encontrado";
    const saudacao = getSaudacao();

    document.getElementById("nome").innerText = nome;

    const statusDiv = document.getElementById("status");

    if (data.bloqueado) {
      // Licença ou não cadastrado
      statusDiv.innerText = (data.motivo || "Licença") + " até " + (data.fim || "data não informada");
      statusDiv.className = "licenca";
      bipErro();
      falar(saudacao + " " + nome + ". Você está de " + (data.motivo || "licença") + ". Acesso não autorizado.");
    } else {
      // Entrada ou Saída
      const tipo = data.tipo; // "Entrada" ou "Saída" - vem do backend!
      const hora = data.hora || new Date().toLocaleTimeString('pt-BR');
      
      statusDiv.innerText = data.status || (tipo + " às " + hora);
      statusDiv.className = (tipo === "Entrada") ? "sucesso" : "saida";
      
      if (tipo === "Entrada") {
        falar(saudacao + " " + nome + ". Sua presença foi confirmada.");
      } else {
        falar(saudacao + " " + nome + ". Sua saída foi confirmada.");
      }
    }

    // Limpa após 10 segundos
    setTimeout(limparTela, 10000);

  } catch (err) {
    console.error(err);
    document.getElementById("status").innerText = "Erro de conexão";
    document.getElementById("status").className = "erro";
    bipErro();
  }
}

// =====================================================
// INICIAR CÂMERA
// =====================================================
function iniciarSistema() {
  const reader = document.getElementById("reader");
  
  if (typeof Html5Qrcode === 'undefined') {
    reader.innerHTML = "<div style='padding:20px;text-align:center'>Erro: Biblioteca não carregou</div>";
    return;
  }

  Html5Qrcode.getCameras().then(devices => {
    if (!devices || devices.length === 0) {
      reader.innerHTML = "<div style='padding:20px;text-align:center'>Nenhuma câmera encontrada</div>";
      return;
    }

    let cameraId = devices[0].id;
    // Tenta usar câmera traseira
    for (let i = 0; i < devices.length; i++) {
      if (/back|traseira|environment/i.test(devices[i].label)) {
        cameraId = devices[i].id;
        break;
      }
    }

    const html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start(
      cameraId,
      { fps: 10, qrbox: { width: 250, height: 250 } },
      onScanSuccess,
      () => {} // onScanFailure vazio
    ).then(() => {
      document.getElementById("nome").innerText = "Aguardando leitura...";
    }).catch(err => {
      reader.innerHTML = "<div style='padding:20px;text-align:center'>Erro: " + err.message + "</div>";
    });
  }).catch(err => {
    reader.innerHTML = "<div style='padding:20px;text-align:center'>Permissão negada. Permita a câmera.</div>";
  });
}

window.onload = iniciarSistema;
</script>
</body>
</html>
